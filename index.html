<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI RPG Chat</title>
    <style>
        :root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--accent:#58a6ff;--gold:#d2a832;--green:#238636;--red:#f85149}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
        .header{background:#21262d;padding:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border)}
        .header select,.header input{padding:6px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:12px}
        .header input{flex:1;min-width:200px}
        .messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;font-size:13px}
        .msg{max-width:80%;padding:8px 12px;border-radius:12px;line-height:1.3;word-wrap:break-word}
        .user{align-self:flex-end;background:#1f6feb;border-bottom-right-radius:4px}
        .bot{align-self:flex-start;background:#21262d;border:1px solid var(--border);border-bottom-left-radius:4px}
        .input-box{display:flex;padding:8px;gap:6px;border-top:1px solid var(--border)}
        .input-box input{flex:1;padding:10px;border:1px solid var(--border);border-radius:20px;outline:none;background:var(--surface);color:var(--text)}
        .input-box button{padding:10px 20px;background:var(--green);color:#fff;border:none;border-radius:20px;cursor:pointer;font-weight:bold}
        .input-box button:disabled{opacity:.5}
    </style>
</head>
<body>
    <div class="header">
        <input type="text" id="ollamaUrl" placeholder="Cloudflare URL из Colab" />
        <select id="model">
            <option value="qwen2.5:7b">Qwen 2.5 7B</option>
            <option value="llama3.2:3b">Llama 3.2 3B</option>
            <option value="gemma2:9b">Gemma 2 9B</option>
        </select>
        <button id="connectBtn">🔗 Подключить</button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-box">
        <input type="text" id="userInput" placeholder="Сообщение..." autocomplete="off" />
        <button id="sendBtn">➤</button>
    </div>

    <script>
        let ollamaURL = '';
        let conversation = [];

        document.getElementById('connectBtn').addEventListener('click', () => {
            const url = document.getElementById('ollamaUrl').value.trim();
            if (url) {
                ollamaURL = url;
                localStorage.setItem('ollama_url', url);
                addMsg('✅ Подключено к Ollama!', 'bot');
            }
        });

        document.getElementById('sendBtn').addEventListener('click', sendMsg);
        document.getElementById('userInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMsg();
        });

        // Загрузка URL из localStorage
        const saved = localStorage.getItem('ollama_url');
        if (saved) {
            document.getElementById('ollamaUrl').value = saved;
            ollamaURL = saved;
        }

        function addMsg(text, cls) {
            const d = document.createElement('div');
            d.className = `msg ${cls}`;
            d.textContent = text;
            document.getElementById('messages').appendChild(d);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg || !ollamaURL) return;

            addMsg(msg, 'user');
            conversation.push({ role: 'user', content: msg });
            input.value = '';
            document.getElementById('sendBtn').disabled = true;

            try {
                const r = await fetch(ollamaURL + '/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: document.getElementById('model').value,
                        messages: conversation.slice(-10),
                        stream: false,
                    }),
                });
                const d = await r.json();
                if (d.message?.content) {
                    addMsg(d.message.content, 'bot');
                    conversation.push({ role: 'assistant', content: d.message.content });
                }
            } catch (e) {
                addMsg('❌ Ошибка: ' + e.message, 'bot');
            }
            document.getElementById('sendBtn').disabled = false;
        }
    </script>
</body>
</html>
